        function updateLabelsByClass(className, translationValue) {
            const elements = document.getElementsByClassName(className);
            for (let i = 0; i < elements.length; i++) {
                if(elements[i].tagName === "OPTION") {
                    elements[i].text = translationValue;
                } else {
                    elements[i].innerText = translationValue;
                }
            }
        }

        // Production-Grade View Switcher Engine with strict Disabled management
        function handleTypeChange(selectElement) {
            const selectedType = selectElement.value;
            const subBoxes = ['amenities-pg-box', 'amenities-flat-box', 'amenities-office-box', 'amenities-chawl-box', 'amenities-generic-box'];
            
            subBoxes.forEach(boxId => {
                document.getElementById(boxId).classList.add('hidden');
                toggleFormInputs(boxId, true);
            });
            
            if (selectedType === 'PG') {
                document.getElementById('amenities-pg-box').classList.remove('hidden');
                toggleFormInputs('amenities-pg-box', false);
            } else if (selectedType === 'Flat') {
                document.getElementById('amenities-flat-box').classList.remove('hidden');
                toggleFormInputs('amenities-flat-box', false);
            } else if (selectedType === 'Office') {
                document.getElementById('amenities-office-box').classList.remove('hidden');
                toggleFormInputs('amenities-office-box', false);
            } else if (selectedType === 'Chawl') {
                document.getElementById('amenities-chawl-box').classList.remove('hidden');
                toggleFormInputs('amenities-chawl-box', false);
            } else if (selectedType === 'Godown' || selectedType === 'Shed' || selectedType === 'Open space') {
                document.getElementById('amenities-generic-box').classList.remove('hidden');
                toggleFormInputs('amenities-generic-box', false);
            }
        }

        function toggleFormInputs(containerId, isDisabled) {
            const container = document.getElementById(containerId);
            const inputs = container.querySelectorAll('input, select, textarea');
            inputs.forEach(input => {
                input.disabled = isDisabled;
            });
        }

            <div class="text-center md:text-left border-b border-slate-100 pb-4 mb-6">
                <h2 id="lbl-main-title" class="text-xl font-black text-blue-950 tracking-tight uppercase">Configure Property Asset</h2>
                <p id="lbl-sub-title" class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mt-1">OWNER MANAGEMENT PANEL</p>
            </div>

            <form action="/property/configure/{{ owner_id }}" method="POST" class="space-y-4 flex-1 flex flex-col">
                
                <input type="hidden" name="owner_id" value="{{ owner_id }}">

                <div class="space-y-1.5">
                    <label id="lbl-card-num" class="text-[10px] font-black text-slate-500 uppercase tracking-wider block">Property Card Number</label>
                    <input type="text" name="property_card_number" required placeholder="e.g., PR-CARD-99012" 
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition shadow-2xs">
                </div>

                <div class="space-y-1.5">
                    <label id="lbl-prop-name" class="text-[10px] font-black text-slate-500 uppercase tracking-wider block">Property Name / Address</label>
                    <input type="text" name="pg_name" required placeholder="e.g., Skyline Residency, Pune" 
                           class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-semibold text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition shadow-2xs">
                </div>

                <div class="space-y-1.5">
                    <label id="lbl-prop-type" class="text-[10px] font-black text-slate-500 uppercase tracking-wider block">Property Type</label>
                    <select name="property_type" onchange="handleTypeChange(this)" required
                            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-bold text-xs text-slate-700 focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition cursor-pointer shadow-2xs">
                        <option value="" disabled {% if not default_type %}selected{% endif %} id="opt-select-class">Select Property Classification</option>
                        <option value="PG" {% if default_type == 'PG' %}selected{% endif %} id="opt-pg">🏠 PG (Paying Guest)</option>
                        <option value="Flat" {% if default_type == 'Flat' %}selected{% endif %} id="opt-flat">🏢 Flat / Apartment</option>
                        <option value="Office" {% if default_type == 'Office' %}selected{% endif %} id="opt-office">💼 Commercial Office</option>
                        <option value="Chawl" id="opt-chawl">🏘️ Chawl Units</option>
                        <option value="Godown" id="opt-godown">🏭 Godown Warehousing</option>
                        <option value="Shed" id="opt-shed">🛠️ Industrial Shed</option>
                        <option value="Open space" id="opt-open">🌳 Open Space Asset</option>
                    </select>
                </div>

                <div id="amenities-pg-box" class="hidden bg-linear-to-b from-blue-50/40 to-indigo-50/40 border border-blue-100 rounded-2xl p-4 sm:p-5 space-y-3 transition shadow-2xs">
                    <label id="lbl-pg-specs" class="text-[10px] font-black text-blue-900 uppercase tracking-wider block border-b border-blue-100/60 pb-1.5">PG Inventory Specifics</label>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="lbl-ac-type text-[9px] font-black text-slate-400 uppercase block">AC / Room Ventilation Type</label>
                            <select name="room_ac_type" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700">
                                <option value="Non-AC" class="opt-non-ac">Non-AC Standard Room</option>
                                <option value="AC" class="opt-ac">Air Conditioned (AC Room)</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="lbl-sharing-type text-[9px] font-black text-slate-400 uppercase block">Room Sharing Tier</label>
                            <select name="sharing_type" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700">
                                <option value="Single" class="opt-single">Single Occupancy</option>
                                <option value="Double" class="opt-double">Double Sharing</option>
                                <option value="Triple" class="opt-triple">Triple Sharing</option>
                                <option value="Four" class="opt-four">Four Sharing</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <div class="space-y-1">
                            <label class="lbl-total-rooms text-[9px] font-black text-slate-400 uppercase block">Total Rooms</label>
                            <input type="number" name="total_rooms" min="0" value="0" class="w-full text-center p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-900">
                        </div>
                        <div class="space-y-1">
                            <label class="lbl-total-beds text-[9px] font-black text-slate-400 uppercase block">Total Beds</label>
                            <input type="number" name="total_beds" min="0" value="0" class="w-full text-center p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-900">
                        </div>
                    </div>

                    <div class="pt-2 border-t border-blue-100">
                        <label class="lbl-amenities text-[9px] font-black text-slate-400 uppercase block mb-1.5">Available Amenities</label>
                        <div class="grid grid-cols-2 gap-2.5 text-slate-700">
                            <label id="chk-txt-bedspace" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Bed" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-wifi" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Wifi" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-geyser" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Geyser" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-purifier" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Water Purifier" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-cupboard" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Cupboard" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                        </div>
                    </div>
                </div>

                <div id="amenities-flat-box" class="hidden bg-slate-50 border border-slate-200/80 rounded-2xl p-4 sm:p-5 space-y-3 transition shadow-2xs">
                    <label id="lbl-flat-specs" class="text-[10px] font-black text-slate-800 uppercase tracking-wider block border-b border-slate-200/60 pb-1.5">Flat Structural Checklist</label>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <div class="space-y-1">
                            <label class="lbl-bhk-config text-[9px] font-black text-slate-400 uppercase block">BHK Configuration</label>
                            <select name="flat_bhk" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700 cursor-pointer">
                                <option value="1BHK" id="opt-1bhk">1 BHK Layout</option>
                                <option value="2BHK" id="opt-2bhk">2 BHK Layout</option>
                                <option value="3BHK" id="opt-3bhk">3 BHK Layout</option>
                                <option value="4BHK" id="opt-4bhk">4 BHK Layout</option>
                            </select>
                        </div>
                        <div class="space-y-1">
                            <label class="lbl-furnishing text-[9px] font-black text-slate-400 uppercase block">Furnishing Level</label>
                            <select name="flat_furnishing" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700 cursor-pointer">
                                <option value="Unfurnished" id="opt-unfurnished">Unfurnished</option>
                                <option value="Semi Furnished" id="opt-semi">Semi Furnished</option>
                                <option value="Fully Furnished" id="opt-fully">Fully Furnished</option>
                            </select>
                        </div>
                    </div>

                    <div class="grid grid-cols-3 gap-2 pt-1">
                        <div>
                            <label class="lbl-ac-type block text-[8px] font-black text-slate-400 uppercase">AC Type</label>
                            <select name="flat_ac_status" class="w-full p-1.5 bg-white border border-slate-200 rounded-lg text-[11px] font-bold">
                                <option value="Non-AC" class="opt-non-ac">Non-AC</option>
                                <option value="AC" class="opt-ac">AC</option>
                            </select>
                        </div>
                        <div>
                            <label class="lbl-parking block text-[8px] font-black text-slate-400 uppercase">Parking</label>
                            <select name="flat_parking" class="w-full p-1.5 bg-white border border-slate-200 rounded-lg text-[11px] font-bold">
                                <option value="None" class="opt-no">None</option>
                                <option value="Bike">Bike</option>
                                <option value="Car">Car</option>
                                <option value="Both">Both</option>
                            </select>
                        </div>
                        <div>
                            <label class="lbl-security block text-[8px] font-black text-slate-400 uppercase">Security</label>
                            <select name="flat_security" class="w-full p-1.5 bg-white border border-slate-200 rounded-lg text-[11px] font-bold">
                                <option value="No" class="opt-no">No</option>
                                <option value="Yes" class="opt-yes">Yes</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-2 border-t border-slate-200/60">
                        <label class="lbl-amenities text-[9px] font-black text-slate-400 uppercase block mb-1.5">Available Amenities</label>
                        <div class="grid grid-cols-2 text-slate-700 gap-2">
                            <label id="chk-txt-f-geyser" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Geyser" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-f-fridge" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Fridge" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-f-fan" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Fan" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-f-bed" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Bed" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-f-ac" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="AC" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-f-cupboard" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Cupboard" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-f-sofa" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Sofa" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-f-tv" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="TV" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                            <label id="chk-txt-f-wifi" class="flex items-center text-xs font-bold gap-2.5 select-none cursor-pointer"><input type="checkbox" name="facilities" value="Wifi" class="w-4 h-4 rounded border-slate-300 text-blue-900 focus:ring-blue-900"></label>
                        </div>
                    </div>
                </div>

                <div id="amenities-office-box" class="hidden bg-slate-50 border border-purple-200 rounded-2xl p-4 sm:p-5 space-y-3 transition shadow-2xs">
                    <label id="lbl-office-specs" class="text-[10px] font-black text-purple-900 uppercase tracking-wider block border-b border-purple-200 pb-1.5">Office Infrastructure Specs</label>
                    <div class="grid grid-cols-3 gap-2">
                        <div>
                            <label class="lbl-cabins block text-[9px] font-black text-slate-400 uppercase">Cabins</label>
                            <input type="number" name="office_cabins" min="0" value="0" class="w-full text-center p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold">
                        </div>
                        <div>
                            <label class="lbl-workstations block text-[9px] font-black text-slate-400 uppercase">Workstations</label>
                            <input type="number" name="office_workstations" min="0" value="0" class="w-full text-center p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold">
                        </div>
                        <div>
                            <label class="lbl-meeting-rooms block text-[9px] font-black text-slate-400 uppercase">Meeting Rooms</label>
                            <input type="number" name="office_meeting_rooms" min="0" value="0" class="w-full text-center p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold">
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-2 pt-1 border-t border-slate-100">
                        <div>
                            <label class="lbl-reception block text-[8px] font-black text-slate-400 uppercase">Reception</label>
                            <select name="office_reception_status" class="w-full p-1.5 bg-white border border-slate-200 rounded-lg text-[11px] font-bold">
                                <option value="No" class="opt-no">No</option>
                                <option value="Yes" class="opt-yes">Yes</option>
                            </select>
                        </div>
                        <div>
                            <label class="lbl-internet block text-[8px] font-black text-slate-400 uppercase">Internet</label>
                            <select name="office_internet_facility" class="w-full p-1.5 bg-white border border-slate-200 rounded-lg text-[11px] font-bold">
                                <option value="No" class="opt-no">No</option>
                                <option value="Yes" class="opt-yes">Yes</option>
                            </select>
                        </div>
                        <div>
                            <label class="lbl-parking block text-[8px] font-black text-slate-400 uppercase">Parking</label>
                            <select name="office_parking_status" class="w-full p-1.5 bg-white border border-slate-200 rounded-lg text-[11px] font-bold">
                                <option value="No" class="opt-no">No</option>
                                <option value="Yes" class="opt-yes">Yes</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div id="amenities-chawl-box" class="hidden bg-slate-50 border border-amber-200 rounded-2xl p-4 sm:p-5 space-y-3 transition shadow-2xs">
                    <label id="lbl-chawl-specs" class="text-[10px] font-black text-amber-900 uppercase tracking-wider block border-b border-amber-200 pb-1.5">Chawl Unit Infrastructure</label>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="lbl-chawl-room-no block text-[9px] font-black text-slate-400 uppercase">Room Number</label>
                            <input type="text" name="chawl_room_number" placeholder="e.g. Room-12" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-semibold">
                        </div>
                        <div>
                            <label class="lbl-chawl-unit-no block text-[9px] font-black text-slate-400 uppercase">Unit Number</label>
                            <input type="text" name="chawl_unit_number" placeholder="e.g. Unit-3" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-semibold">
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-1 border-t border-slate-100">
                        <div>
                            <label class="lbl-water-supply block text-[9px] font-black text-slate-400 uppercase">Water Connection</label>
                            <select name="chawl_water_connection" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-bold text-slate-700">
                                <option value="Shared" class="opt-shared-water">Common Shared Tap</option>
                                <option value="Private" class="opt-private-water">Own Dedicated Connection</option>
                            </select>
                        </div>
                        <div>
                            <label class="lbl-electricity-meter block text-[9px] font-black text-slate-400 uppercase">Electricity Meter</label>
                            <input type="text" name="chawl_electricity_meter_no" placeholder="Meter Sub-ID" class="w-full p-2 bg-white border border-slate-200 rounded-lg text-xs font-semibold">
                        </div>
                    </div>
                </div>

                <div id="amenities-generic-box" class="hidden bg-slate-50 border border-slate-300 rounded-2xl p-4 sm:p-5 space-y-3 transition shadow-2xs">
                    <label id="lbl-generic-specs" class="text-[10px] font-black text-slate-700 uppercase tracking-wider block border-b border-slate-200 pb-1.5">Industrial & Open Asset Specs</label>
                    <div>
                        <label class="lbl-generic-capacity block text-[9px] font-black text-slate-400 uppercase mb-1">Industrial Asset Capacity Details</label>
                        <input type="text" name="generic_area_specification" placeholder="e.g. 4500 Sq. Ft. Total Clear Area Boundary" class="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg text-xs font-semibold">
                    </div>
                </div>

                <div class="space-y-1.5 pt-2 border-t border-slate-100">
                    <label id="lbl-property-terms" class="text-[10px] font-black text-slate-500 uppercase tracking-wider block">Property Specific Terms & Conditions</label>
                    <textarea name="property_terms" rows="3" required placeholder="Enter rule declarations... e.g., Monthly rent due before the 5th, 1-month advance notice required for checkout, no smoking inside premises."
                              class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl font-medium text-xs text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-900 focus:bg-white transition"></textarea>
                </div>

                <div class="pt-4 mt-auto">
                    <button type="submit" class="w-full py-3.5 bg-blue-900 hover:bg-blue-950 text-white rounded-xl font-black text-xs tracking-widest uppercase transition-all duration-200 shadow-md shadow-blue-900/10 cursor-pointer text-center">
                        <span id="btn-save-txt">Save Property Profile</span>
                    </button>
                </div>
            </form>
        </div>

        <div class="mt-8 pt-4 border-t border-slate-100">
            <div id="lbl-ad-txt" class="w-full bg-slate-100 border-2 border-dashed border-slate-300 text-slate-400 font-bold text-xs tracking-[0.25em] text-center py-4 rounded-xl select-none">
                ADVERTISE WINDOW
            </div>
        </div>

    </div>

</body>
</html>
