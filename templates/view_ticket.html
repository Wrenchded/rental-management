<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Ticket - {{ ticket.ticket_id }}</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 p-8">
    <div class="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-200">
        
        <div class="mb-8">
            <h1 class="text-2xl font-black text-slate-950">Ticket: {{ ticket.ticket_id }}</h1>
            <p class="text-sm text-slate-500 mt-2">Description: {{ ticket.description }}</p>
        </div>

        <form method="POST" action="/dashboard/owner/assign-technician/{{ ticket.ticket_id }}" class="mb-10">
            <input type="hidden" name="owner_id" value="{{ ticket.owner_id }}">
            
            <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Assign Technician</label>
            <div class="flex flex-col sm:flex-row gap-3">
                <select name="technician_id" class="w-full sm:flex-1 p-3 border border-slate-200 rounded-xl bg-white font-semibold text-sm text-slate-800 focus:outline-none focus:ring-2 focus:ring-blue-900 focus:border-transparent transition" required>
                    <option value="">Select a technician...</option>
                    {% for tech in technicians %}
                        <option value="{{ tech.tech_id }}">{{ tech.name }} ({{ tech.specialization }})</option>
                    {% endfor %}
                </select>
                <button type="submit" class="w-full sm:w-auto bg-blue-950 text-white font-black px-6 py-3.5 sm:py-3 rounded-xl hover:bg-blue-900 transition tracking-wider text-xs cursor-pointer text-center">
                    ASSIGN
                </button>
            </div>
        </form>

        <hr class="my-8 border-slate-100">

        <h2 class="text-lg font-black text-slate-950 mb-4">Complete & Generate Invoice</h2>
        <form method="POST" action="/dashboard/owner/resolve-ticket-and-bill/{{ ticket.ticket_id }}" class="space-y-4">
            
            <input type="hidden" name="owner_id" value="{{ ticket.owner_id }}">

            <div>
                <label class="block text-sm font-bold text-slate-600 mb-1">Select Technician</label>
                <select name="tech_id" class="w-full p-3 border border-slate-200 rounded-xl" required>
                    {% for tech in technicians %}
                        <option value="{{ tech.tech_id }}">{{ tech.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <input type="number" step="0.5" name="hours_spent" placeholder="Hours Spent" class="w-full p-3 border border-slate-200 rounded-xl" required>
            <input type="number" name="parts_cost" placeholder="Parts Cost (₹)" class="w-full p-3 border border-slate-200 rounded-xl" required>
            <textarea name="parts_description" placeholder="List parts used..." class="w-full p-3 border border-slate-200 rounded-xl" rows="2" required></textarea>
            
            <button type="submit" class="w-full bg-emerald-600 text-white font-black py-3 rounded-xl hover:bg-emerald-700 transition">
                RESOLVE & GENERATE BILL
            </button>
        </form>

    </div>
</body>
</html>
